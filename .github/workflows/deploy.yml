name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: qingdaitransriber
  RG: rg-whisper
  IMAGE_NAME: transcriber

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short commit SHA as image tag
        id: set-tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push (linux/amd64)
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ steps.set-tag.outputs.tag }}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"

  deploy-staging:
    name: Deploy to staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update staging Container App image
        run: |
          az containerapp update \
            --name transcriber-staging \
            --resource-group "$RG" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ needs.build.outputs.image_tag }}"

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update production Container App image
        run: |
          az containerapp update \
            --name transcriber-prod \
            --resource-group "$RG" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ needs.build.outputs.image_tag }}"
